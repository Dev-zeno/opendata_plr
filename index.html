    <!-- Safari HTTPS 환경을 위한 인라인 크리티컬 CSS -->
    <style>
        /* Safari 기본 리셋 */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        input,
        textarea {
            -webkit-user-select: auto;
            -moz-user-select: auto;
            -ms-user-select: auto;
            user-select: auto;
        }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background: #f5f5f5;
            /* Safari 하드웨어 가속 */
            -webkit-transform: translate3d(0, 0, 0);
            transform: translate3d(0, 0, 0);
            will-change: transform;
            /* Safari 터치 최적화 */
            -webkit-overflow-scrolling: touch;
        }

        #loading-indicator {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: -webkit-flex;
            display: flex;
            -webkit-justify-content: center;
            justify-content: center;
            -webkit-align-items: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        /* Safari 모바일 모달 기본 스타일 */
        .mobile-modal {
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-perspective: 1000px;
            perspective: 1000px;
        }

        .mobile-modal-content {
            -webkit-transform: translate3d(0, 100%, 0);
            transform: translate3d(0, 100%, 0);
            will-change: transform;
        }

        .mobile-modal:not(.hidden) .mobile-modal-content {
            -webkit-transform: translate3d(0, 0, 0);
            transform: translate3d(0, 0, 0);
        }
    </style>

    <!-- 비동기 리소스 (렌더링 블로킹 방지) -->
    <script>
        // Tailwind CSS 비동기 로드 및 기본 폰트 설정
        const tailwindScript = document.createElement('script');
        tailwindScript.src = 'https://cdn.tailwindcss.com';
        tailwindScript.async = false; // 순서 보장을 위해 동기적으로 실행
        document.head.appendChild(tailwindScript);

        tailwindScript.onload = () => {
            tailwind.config = {
                theme: {
                    extend: {
                        fontFamily: {
                            sans: ['Inter', 'Noto Sans KR', 'sans-serif'],
                        }
                    }
                }
            }
        };

        // Font Awesome 비동기 로드
        const fontAwesome = document.createElement('link');
        fontAwesome.rel = 'stylesheet';
        fontAwesome.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css';
        document.head.appendChild(fontAwesome);
    </script>

    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=hgte1ya8vs"></script>

<body>
    <!-- Mobile Top Search Header (Mobile Only) -->
    <div class="mobile-search-header">
        <div class="mobile-search-container">
            <div class="mobile-search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="mobile-search-input" placeholder="도서관명 또는 지역으로 검색...">
            </div>
        </div>
        <div class="mobile-city-filter">
            <div id="mobile-city-buttons" class="mobile-city-scroll"></div>
        </div>
    </div>

    <!-- Main Sidebar (Tailwind Base Design) -->
    <div id="sidebar"
        class="w-80 h-full bg-white border-r border-gray-200 flex flex-col shrink-0 flex-1 overflow-hidden z-10 transition-all">
        <!-- 모바일 드래그 핸들 -->
        <div class="mobile-drag-handle flex justify-center py-2 relative">
            <div class="drag-indicator w-12 h-1.5 bg-gray-300 rounded-full"></div>
        </div>

        <!-- Sidebar List View (Default) -->
        <div id="sidebar-list-view" class="flex-col h-full flex w-full">
            <div class="sidebar-header p-5 border-b border-gray-200 shrink-0">
                <div class="flex items-center space-x-2 text-indigo-600 mb-5">
                    <i class="fa-solid fa-book-open text-xl"></i>
                    <h1 class="text-xl font-bold tracking-tight text-gray-900 m-0 leading-tight">도서관 자리찾기</h1>
                </div>

                <!-- 필터 & 검색 영역 -->
                <div id="filter-content" class="mb-5 space-y-3">
                    <div id="city-selection-container" class="flex space-x-2 w-full">
                        <select id="city-select"
                            class="flex-1 bg-white border border-gray-200 text-gray-900 text-[15px] font-medium rounded-lg hover:border-indigo-300 focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5 outline-none transition-colors cursor-pointer">
                            <option value="">시/도 선택</option>
                        </select>
                        <select id="district-select"
                            class="flex-1 bg-white border border-gray-200 text-gray-900 text-[15px] font-medium rounded-lg hover:border-indigo-300 focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5 outline-none transition-colors cursor-pointer disabled:bg-gray-50 disabled:text-gray-400 disabled:cursor-not-allowed"
                            disabled>
                            <option value="">전체</option>
                        </select>
                    </div>
                    <div class="search-container relative w-full">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                            <i class="fas fa-search text-gray-400"></i>
                        </div>
                        <input type="text" id="search-input"
                            class="bg-white border border-gray-200 text-gray-900 text-[15px] rounded-lg focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500 block w-full pl-10 p-2.5 outline-none transition-colors"
                            placeholder="도서관 이름 검색">
                    </div>
                </div>

                <div
                    class="update-info flex justify-between items-center text-xs text-gray-500 mt-4 pt-3 border-t border-gray-100">
                    <span id="update-time">업데이트 중...</span>
                    <button id="refresh-button"
                        class="text-indigo-600 hover:text-indigo-800 hover:bg-indigo-50 px-2 py-1 rounded transition-colors bg-transparent border-none cursor-pointer flex items-center">
                        <i class="fas fa-sync-alt mr-1"></i> 새로고침
                    </button>
                </div>
            </div>

            <!-- Search Results (flex-1 for scrolling) -->
            <div id="search-results" class="flex-1 overflow-y-auto p-3 space-y-3 bg-gray-50"></div>
        </div>

    </div>
    </div>

    <!-- Map Container -->
    <div id="map-container" class="relative">
        <!-- Map Detail Panel (Overlay) -->
        <div id="map-detail-panel"
            class="hidden absolute top-4 left-4 z-20 w-[360px] max-w-[calc(100vw-32px)] bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden max-h-[calc(100vh-32px)] flex-col">
            <!-- 렌더링 영역 (JS에서 채움) -->
        </div>

        <div id="map"></div>

        <!-- Desktop Sidebar Toggle -->
        <button id="sidebar-toggle" class="desktop-only text-gray-500 flex items-center justify-center">
            <i class="fas fa-chevron-left"></i>
        </button>

        <!-- Mobile Bottom Sheet Toggle -->
        <button id="mobile-toggle" class="mobile-only">
            <i class="fas fa-list"></i>
        </button>

        <!-- 플로팅 액션 버튼들 -->
        <div class="floating-actions">
            <button class="floating-btn" title="위치">
                <i class="fas fa-crosshairs"></i>
            </button>
            <button class="floating-btn" title="즐겨찾기">
                <i class="fas fa-star"></i>
            </button>
            <button class="floating-btn" title="레이어">
                <i class="fas fa-layer-group"></i>
            </button>
        </div>

        <!-- 통계 카드 -->
        <div class="summary-stats">
            <div class="stat-item">
                <span class="stat-value" id="total-libraries">15</span>
                <span class="stat-label">전국 도서관</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="available-seats">1008</span>
                <span class="stat-label">잔여 좌석</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="total-seats">2450</span>
                <span class="stat-label">전체 좌석</span>
            </div>
        </div>
    </div>

    <!-- 모달 -->
    <div id="modal-container" class="hidden">
        <div id="modal-content">
            <span id="modal-close">&times;</span>
            <iframe id="seat-map-frame" src="" frameborder="0"></iframe>
        </div>
    </div>

    <!-- 모바일 시군구 선택 모달 -->
    <div id="mobile-district-modal" class="mobile-modal hidden">
        <div class="mobile-modal-backdrop"></div>
        <div class="mobile-modal-content">
            <div class="mobile-modal-header">
                <div class="mobile-modal-drag-handle"></div>
                <div class="mobile-modal-title">
                    <span id="mobile-current-city-name">시도명</span>
                    <span class="mobile-modal-subtitle">지역 선택</span>
                </div>
                <button id="mobile-modal-close" class="mobile-modal-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="mobile-modal-body">
                <button id="mobile-all-districts" class="mobile-district-btn mobile-all-btn">
                    전체 <span class="count">0</span>
                </button>
                <div id="mobile-district-list" class="mobile-district-grid">
                    <!-- 시군구 버튼들이 동적으로 생성됩니다 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 메인 스크립트 동기 로드 (모바일 기능 정상 동작을 위해) -->
